{% extends "base.html" %}

{% block content %}
<form id="verify-form" novalidate>
  <div class="row g-4">
    <!-- Application Form -->
    <div class="col-lg-6">
      <div class="card h-100">
        <div class="card-header bg-light">
          <h5 class="card-title mb-0">Application Form Data</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label for="brand_name" class="form-label">Brand Name</label>
            <input type="text" class="form-control form-control-lg" id="brand_name"
                   name="brand_name" required placeholder="e.g. CASCADE WINERY">
            <div class="invalid-feedback">Brand name is required.</div>
          </div>

          <div class="mb-3">
            <label for="alcohol_content" class="form-label">Alcohol Content</label>
            <div class="input-group input-group-lg">
              <input type="number" class="form-control" id="alcohol_content"
                     name="alcohol_content" required min="0" max="100" step="0.1"
                     placeholder="e.g. 11.5">
              <span class="input-group-text">%</span>
            </div>
            <div class="invalid-feedback">Alcohol content is required.</div>
          </div>

          <div class="mb-3">
            <label for="net_contents" class="form-label">Net Contents</label>
            <input type="text" class="form-control form-control-lg" id="net_contents"
                   name="net_contents" required placeholder='e.g. 750 ML, 1 L, 12 fl. oz.'>
            <div class="invalid-feedback">Net contents is required.</div>
          </div>

          <div class="form-check mt-4">
            <input class="form-check-input" type="checkbox" id="gov_warning" name="gov_warning">
            <label class="form-check-label" for="gov_warning">
              Government warning present on label
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Label Upload -->
    <div class="col-lg-6">
      <div class="card h-100">
        <div class="card-header bg-light">
          <h5 class="card-title mb-0">Label Images</h5>
        </div>
        <div class="card-body d-flex flex-column">
          <div id="drop-zone" class="drop-zone mb-3">
            <div class="drop-zone-prompt">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="mb-2 text-muted" viewBox="0 0 16 16">
                <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
                <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
              </svg>
              <p class="mb-1">Drag &amp; drop label images here</p>
              <p class="text-muted small mb-2">or</p>
              <button type="button" class="btn btn-outline-secondary btn-sm" id="browse-btn">Browse Files</button>
              <input type="file" id="file-input" multiple accept=".jpg,.jpeg,.png,.webp" class="d-none">
              <p class="text-muted small mt-2 mb-0">JPG, PNG, or WebP</p>
            </div>
          </div>

          <div id="preview-container" class="preview-grid flex-grow-1"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Verify Button -->
  <div class="d-flex justify-content-center align-items-center gap-4 mt-4">
    <button type="submit" class="btn btn-primary btn-lg px-5" id="verify-btn">
      <span id="verify-text">Verify Labels</span>
      <span id="verify-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
    </button>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="debug-toggle">
      <label class="form-check-label" for="debug-toggle">Debug mode</label>
    </div>
    <div class="d-none" id="engine-group">
      <label for="engine-select" class="form-label mb-0 small">OCR Engine</label>
      <select class="form-select form-select-sm" id="engine-select" style="width:auto">
        <option value="paddleocr">PaddleOCR</option>
        <option value="tesseract" selected>Tesseract</option>
      </select>
    </div>
  </div>
</form>

<!-- Results Section -->
<section id="results-section" class="mt-5 d-none">
  <h4 class="mb-3">Verification Results</h4>
  <div id="results-container"></div>
</section>
{% endblock %}
